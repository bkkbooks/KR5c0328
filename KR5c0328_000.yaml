body:
  text: 守仙五子丸方餘甘子覆盆子兔絲子五味子車前子右巳上五子各五大兩别搗如粉麵取二三月枸杞嫩莖葉搗取汁二大升拌藥末令盡乾訖後七八月採蓮子草取汁一大升亦拌藥末令乾又取杏仁一大升取好酒研取汁五大升於銀器中煎令杏仁無苦味次下生地黃汁半大升真酥五大兩鹿角膠五大兩炙搗末都入前汁中略煎過又下五子末一時以柳箆急攪看乾濕得所衆手丸之如梧桐子大每日酒下三十丸如要加減以意斟之忌豬肉蒜芥蘿蔔等服之百日先服金石藥毒並盡亦益金丹氣通流於五藏潤澤血肉萬毒悉除髭鬢如漆返老成少皆因制其丹隂陽氣兩性彼此相備矣祕之通玄先生製五子守仙丸歌以讃其妙歌曰反老成少是還丹不得守仙亦大難要見鬢斑令却黑一日但服三十丸松竹本自無艷色金液因從大制乾五子可定千秋旨百歲如同一萬年隂真人論三品大丹之靈效亦云五味守仙之草藥尚能守生相助如不得上升且為地仙永不死矣為其制一切丹砂及解諸石毒永不發動又益靈丹之功火行於榮衛也決定無疑矣隂君之意言五子草藥尚能令人不死即神丹之功可知矣今以旁有助於守仙丸故附之于後懸解録終
  hash: sha256:cbcb3dda5ade4228003c2ca9a2e773792fc3d55a772f53120e5e06cf8b495c05
