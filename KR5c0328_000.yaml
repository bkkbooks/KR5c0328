front:
  text: 懸解録并序余少甚抱疾専意修養至於金石服餌亦嘗勤求竊見時之好事者不顧貨財大修爐鼎謂河車立成可變土石謂金沙立化可壯筋骸然而往往有為藥所誤者醫救莫及何哉豈根源不正歟師法不明歟奚終始不相副如此之甚也余因覽道書偶見九霄君告劉泓丹藥要訣乃諭俗徒都未窺至道之毫未而妄自誇衒誑誘時人凡所施為無非自伐之捷徑能無悲乎真仙之言定不誣矣余久懷滯惑方困於是今故採其要語書之座隅目之曰懸解録冀觀覽之時疑撓盡釋雖未達金液守身之術當必免毒丹傷命之虞亦天年之幸也如有同我斯志者固願攻其未悟耳大中九年乙亥嵗五月十七日甲子也纂辨金石藥并去毒訣漢安帝時有劉泓者久學至道棄官入山後至延光元年十一月九霄君來降為憫道士不知燒丹之正道乃指陳至藥之根源分别雜丹之門戶拜解金石毒守仙丸方傳付於泓疏之如後九霄君謂劉泓曰夫學錬金液還丹并服丹砂硫黃兼諸乳石等藥世人苦求得之將為便成至藥不知深淺競學服餌皆覓長生不死者也並不悟金丹并諸石藥各有本性懷大毒在其中道士服之從羲軒巳來萬不存一未有不死者劉泓再拜稽首問曰何也九霄君曰世人所造金丹服餌皆求長生愚者即竭力以資俗事又欲將至藥求點化金銀榮其行尸以養僕妾但一起心即是必死之兆至藥亦無因而見也準教藥無雙能功無二用又不知藥有至毒造丹成後世人只知餘甘制河車磁石引針硫黃乾水銀將謂制金丹了便無毒矣假如先賢鍊秋石秋石以地霜結為石能引生汞亦能制金石毒亦能壯金石毒如有服者中路毒發不可禁止必見死矣縱不死者亦卒患惡瘡此為先兆也秋石云解毒且見朱砂及粉霜并硫黃等被秋石制伏豈能解毒矣先聖遺教世人難知焉知之者真仙也不知者凡人也泓又問曰變化銅鐵之藥並不堪服何也君曰緣點化藥法多用諸礬石硝硇之類共結成毒藥雖能乾制水銀及化銅鐵其用火時候亦與至藥不同緣毒成結在其中縱令千銷萬化毒終不出亦如人有毒心毒在心內必不從外入亦如木中有火火元在內其點化之道本亦在內各受其性色目法作不同氣遞相生各懷毒性雄雌硝硇雜類相助其火候不依天時地理之法或近或逺者蓋不稟天逍而成則知古往仙人不服此藥明矣緣有大毒造化之力不足故也泓又問曰點化之藥為有雜石衆毒固不堪服常聞換頭紫粉七返丹砂更無礬硇所雜可以服否君曰此二藥世人千百中無一人解作縱能為之亦不堪服何也且換頭紫粉是仙人所合粉以為宫室之用緣有硫黃在其中水銀入硫黃含大毒豈可服哉又七返丹砂雖燠令伏火本無四象五行筋骨血肉隂陽氣不全如服之令人五臟血乾凡人血少則病血盡則死矣泓曰世人修服丹砂顆塊不破顔色如故大火燒之不動者復如何君曰凡朱砂凝結之初皆於沙石中成質縱是光明者飛之每斤只得十二雨水銀其四兩即是山澤滓滯之物其滓懷大毒道士若不解出滓便相和服之服者則澀人氣脈乾人血液豈得有益乎況從古巳來道士未經至仙之教皆謂伏火丹砂是死水銀妄言金砂入五內有不死之兆甚錯矣世人豈不知從前服者未有不死之人唯硫黃獨體不入他藥猶能去人積冷但不可多服緣是純陽氣不全耳其他小術固所不論泓又問曰何藥則堪服可以延駐君曰我仙人所錬至藥例皆日魂月魄四氣為象日魂不離曰裏月魄不離月中假如至藥亦不離從木而生何也木帶青以象水銀內含其火火為陽以象朱砂朱砂屬離離南方火之位火為朱砂亦同木中有火矣配木入中宫之土土能尅水火能生土而乃道成如人初生嬰孩及長大還為人父母遞換相承本處其一至藥根本亦不處二道之無根以心為根道之無用以四時受氣發生各得其所為用道因氣而生因氣而死至藥服之不死者蓋為不參雜諸味無毒銷成汁為器或方或圓並皆赫然通徹晝夜光明然始堪服去人昏沉定人神思除邪魅耐寒暑皮膚潤澤髭鬢不白返老成少千日可驗故服之不死泓又問曰至藥有幾般君曰真正之門有三焉一曰神符上仙上丹二曰白雪中仙上丹三曰九轉下仙上丹其三般丹同出一門而異名各有三一禁法不可輕傳於人何謂不可輕傳假如神符若無太一宫天一宫成者即名白液終不成器緣以天一宫毬名其三一不可傳白雪若不堅不成冰不入調青不受青氣亦共粉毒霜無别亦如日無烏而不明月無桂而無魄相似緣以凝成堅冰調青如磁石引針其三一不可傳九轉曾青白雪成結即入紫宫用緣以凝四氣納萬象而成質其三一不可傳夫至藥若不受四氣混沌豈能號曰龍虎之丹所以我仙人天地之玄化成同日月之光如神符白雪修錬功畢始有上升之路九轉即返老成少顔如處子壽同南山矣其三一之訣不許輕傳豈不愼哉泓曰三一之旨玄矣祕矣未知何人即可傳授君曰如吾者即可傳授夫三一者造化之機關也非獨至藥有之凡人身中亦皆自備人若能修身中三一者即子毋不相離神氣自相守怡怡和煦光照明白子不見至陽之月當晝之景乎風雲不生纎埃不動碧空澄徹豈有障翳哉人亦有之若常能調三一萬慮不生者輿碧空之氣相合內外光明虛無同體者亦可升騰矣世人或有竊聞此道者云是服氣乃鼻吸口吐鼓腮強咽立可致其殞斃亦猶藥中錯服毒丹不可救矣所以身中三一與至藥三一不硃其身中三一亦不可轉傳也泓又問曰如有人先服丹砂及乳石硫黃紫粉毒發者如何救解之君曰巳服死者不可言也如有後服者只可救之遞須相勸道士急造守仙丸救之可存性命假如換頭紫粉緣不入凝白雪為骨骨為陽及無調青入者即名大毒紫粉人服不看多少遠近如喫雜物觸犯不問日月遲晚如發不在醫療限例不出三日五日無藥可救如硫黃紫粉伏火丹砂及諸乳石若發守仙丸猶可救之十有二三命在若曾服諸石藥雖未發能防備預服守仙丸尤妙泓又問曰三大丹既延駐人命無毒如未畢功可以服否君曰神符白雪九轉未經太一宫者四象未全不可服如有人悮服者忽覺發動不安但急喫伏龍肝汁并甘草湯生菉豆汁乃立定少見命終何也緣此三藥並無雜類相撓只空火毒乃不至死除此三般其餘丹砂之流雖然一朝一夕強餐亦能益色如忽發動命危之矣泓曰守仙丸法可得聞乎君曰守仙五子丸此法仙家所祕然令擇有道之士授之以護其性命今故一一教示爾并粗舉三丹大略爾宜熟思流傳以救未悟者無忘言吾將往矣泓乃雨淚稽顙再拜九霄君舉手告别入雲不見矣劉泓乃於山中刻石書記後有道士見之録出遂傳於世至唐開元中通玄先生張果進上此方明皇大喜祕於禁中通玄兼述三丹之功極備但無修丹之法今不書去繁也
